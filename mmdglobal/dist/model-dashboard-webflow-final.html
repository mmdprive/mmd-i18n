<div
  id="mmd-immigration-dashboard"
  data-dashboard-role="model"
  data-resolve-endpoint="https://www.mmdbkk.com/member/api/invite/resolve"
  data-title="แดชบอร์ดโมเดล"
  data-subtitle="สรุปสิทธิ์ฝั่งโมเดล, เงื่อนไข binding/compliance, ข้อมูลลูกค้าที่แนบมากับลิงก์นี้ และ route ที่เปิดให้ใช้งาน"
></div>

<style>
#mmd-immigration-dashboard{
  --igd-bg:#050607;
  --igd-panel:rgba(15,17,19,.78);
  --igd-panel-2:rgba(19,24,28,.64);
  --igd-line:rgba(184,146,87,.14);
  --igd-line-soft:rgba(224,211,180,.08);
  --igd-text:#f4efe8;
  --igd-text-soft:rgba(244,239,232,.75);
  --igd-gold:#bf9551;
  --igd-gold-2:#efd3a1;
  --igd-shadow:0 28px 80px rgba(0,0,0,.34);
  color:var(--igd-text);
  font-family:"Outfit","DM Sans","Noto Sans Thai",system-ui,sans-serif;
}
#mmd-immigration-dashboard *{ box-sizing:border-box; }
#mmd-immigration-dashboard .igd-wrap{ width:min(1180px, calc(100% - 20px)); margin:0 auto; }
#mmd-immigration-dashboard .igd-shell{ display:grid; gap:18px; }
#mmd-immigration-dashboard .igd-hero,
#mmd-immigration-dashboard .igd-card{
  border:1px solid var(--igd-line);
  border-radius:30px;
  box-shadow:var(--igd-shadow);
}
#mmd-immigration-dashboard .igd-hero{
  display:grid;
  grid-template-columns:minmax(0,1.16fr) minmax(320px,.84fr);
  gap:20px;
  padding:30px;
  background:
    radial-gradient(circle at top left, rgba(239,211,161,.16), transparent 33%),
    radial-gradient(circle at bottom right, rgba(54,100,120,.12), transparent 36%),
    linear-gradient(135deg, rgba(8,11,14,.92), rgba(17,20,24,.76)),
    var(--igd-panel);
  backdrop-filter:blur(18px);
}
#mmd-immigration-dashboard .igd-eyebrow{
  font-size:12px;
  font-weight:800;
  letter-spacing:.16em;
  text-transform:uppercase;
  color:rgba(244,239,232,.60);
}
#mmd-immigration-dashboard .igd-title{
  margin:12px 0 0;
  font-size:clamp(34px, 5vw, 58px);
  line-height:.96;
  letter-spacing:-.05em;
}
#mmd-immigration-dashboard .igd-sub{
  margin:14px 0 0;
  max-width:760px;
  font-size:15px;
  line-height:1.84;
  color:var(--igd-text-soft);
}
#mmd-immigration-dashboard .igd-status{
  margin-top:14px;
  display:inline-flex;
  padding:10px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.04);
  color:var(--igd-text-soft);
  font-size:13px;
  border:1px solid rgba(255,255,255,.04);
}
#mmd-immigration-dashboard .igd-status.ok{
  color:var(--igd-gold-2);
  border-color:rgba(239,211,161,.20);
  background:rgba(239,211,161,.06);
}
#mmd-immigration-dashboard .igd-status.bad{
  color:#ffc4c4;
  border-color:rgba(255,120,120,.24);
  background:rgba(255,120,120,.05);
}
#mmd-immigration-dashboard .igd-hero__side{
  border:1px solid var(--igd-line-soft);
  border-radius:24px;
  padding:20px;
  background:
    linear-gradient(180deg, rgba(255,255,255,.022), rgba(255,255,255,.008)),
    var(--igd-panel-2);
}
#mmd-immigration-dashboard .igd-pill{
  display:inline-flex;
  padding:8px 12px;
  border-radius:999px;
  background:rgba(239,211,161,.10);
  color:var(--igd-gold-2);
  font-size:11px;
  font-weight:800;
  letter-spacing:.08em;
  text-transform:uppercase;
}
#mmd-immigration-dashboard .igd-side__title{
  margin-top:14px;
  font-size:26px;
  font-weight:900;
  line-height:1.04;
}
#mmd-immigration-dashboard .igd-side__copy{
  margin-top:12px;
  font-size:14px;
  line-height:1.8;
  color:var(--igd-text-soft);
}
#mmd-immigration-dashboard .igd-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:16px;
}
#mmd-immigration-dashboard .igd-card{
  padding:20px;
  background:
    radial-gradient(circle at top left, rgba(239,211,161,.06), transparent 28%),
    linear-gradient(180deg, rgba(255,255,255,.024), rgba(255,255,255,.008)),
    var(--igd-panel);
}
#mmd-immigration-dashboard .igd-card__title{
  margin:0;
  font-size:22px;
  font-weight:900;
}
#mmd-immigration-dashboard .igd-card__meta{
  margin-top:6px;
  font-size:13px;
  line-height:1.7;
  color:var(--igd-text-soft);
}
#mmd-immigration-dashboard .igd-card__body{
  margin-top:14px;
  display:grid;
  gap:10px;
}
#mmd-immigration-dashboard .igd-kv,
#mmd-immigration-dashboard .igd-route{
  display:grid;
  gap:6px;
  padding:13px 14px;
  border-radius:18px;
  border:1px solid rgba(224,211,180,.07);
  background:rgba(255,255,255,.02);
}
#mmd-immigration-dashboard .igd-actions{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-top:6px;
}
#mmd-immigration-dashboard .igd-btn{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-height:42px;
  padding:10px 14px;
  border-radius:999px;
  text-decoration:none;
  font-weight:800;
  color:#130f08;
  background:linear-gradient(180deg, var(--igd-gold-2), var(--igd-gold));
  box-shadow:0 12px 30px rgba(191,149,81,.22);
}
#mmd-immigration-dashboard .igd-kv__k,
#mmd-immigration-dashboard .igd-route__label{
  font-size:11px;
  letter-spacing:.09em;
  text-transform:uppercase;
  color:rgba(244,239,232,.56);
}
#mmd-immigration-dashboard .igd-kv__v,
#mmd-immigration-dashboard .igd-route__value{
  font-size:15px;
  font-weight:800;
  line-height:1.58;
  word-break:break-word;
}
@media (max-width:960px){
  #mmd-immigration-dashboard .igd-hero,
  #mmd-immigration-dashboard .igd-grid{ grid-template-columns:1fr; }
  #mmd-immigration-dashboard .igd-hero{ padding:22px; }
}
</style>

<script>
(function () {
  "use strict";

  const root = document.getElementById("mmd-immigration-dashboard");
  if (!root || root.__MMD_IG_DASHBOARD_INIT__) return;
  root.__MMD_IG_DASHBOARD_INIT__ = true;

  const token = String(new URLSearchParams(window.location.search).get("t") || "").trim();

  const CONFIG = {
    role: String(root.getAttribute("data-dashboard-role") || "model").trim().toLowerCase(),
    resolveEndpoint:
      root.getAttribute("data-resolve-endpoint") ||
      "https://www.mmdbkk.com/member/api/invite/resolve",
    title: root.getAttribute("data-title") || "แดชบอร์ดโมเดล",
    subtitle:
      root.getAttribute("data-subtitle") ||
      "สรุปสิทธิ์ฝั่งโมเดล, เงื่อนไข binding/compliance, ข้อมูลลูกค้าที่แนบมากับลิงก์นี้ และ route ที่เปิดให้ใช้งาน",
  };

  function esc(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;");
  }

  function toStr(value) {
    return String(value == null ? "" : value).trim();
  }

  function yesNo(value) {
    return value ? "ต้องทำ" : "ไม่บังคับ";
  }

  function fmtDate(value) {
    const raw = toStr(value);
    if (!raw) return "-";
    const d = new Date(raw);
    if (Number.isNaN(d.getTime())) return raw;
    return d.toLocaleString("th-TH", {
      year: "numeric",
      month: "short",
      day: "2-digit",
      hour: "2-digit",
      minute: "2-digit",
      timeZone: "Asia/Bangkok",
    });
  }

  function roleLabel(role) {
    return role === "model" ? "โมเดล" : "ลูกค้า";
  }

  function laneLabel(lane) {
    return lane === "model_console" ? "ฝั่งคอนโซลโมเดล" : "ฝั่งลูกค้า";
  }

  function card(title, meta, body) {
    return `
      <section class="igd-card">
        <div class="igd-card__head">
          <div>
            <h2 class="igd-card__title">${esc(title)}</h2>
            <div class="igd-card__meta">${esc(meta)}</div>
          </div>
        </div>
        <div class="igd-card__body">${body}</div>
      </section>
    `;
  }

  function kvRows(rows) {
    return rows.map(function (row) {
      return `
        <div class="igd-kv">
          <div class="igd-kv__k">${esc(row[0])}</div>
          <div class="igd-kv__v">${esc(row[1] || "-")}</div>
        </div>
      `;
    }).join("");
  }

  function routeRow(label, value) {
    const v = toStr(value);
    return `
      <div class="igd-route">
        <div class="igd-route__label">${esc(label)}</div>
        <div class="igd-route__value">${esc(v || "-")}</div>
      </div>
    `;
  }

  function actionLink(href, label) {
    const url = toStr(href);
    if (!url) return "";
    return `<a class="igd-btn" href="${esc(url)}" target="_blank" rel="noopener">${esc(label)}</a>`;
  }

  function injectShell() {
    root.innerHTML = `
      <div class="igd-wrap">
        <div class="igd-shell">
          <section class="igd-hero">
            <div class="igd-hero__main">
              <div class="igd-eyebrow">MMD PRIVÉ • MODEL DESK</div>
              <h1 class="igd-title">${esc(CONFIG.title)}</h1>
              <p class="igd-sub">${esc(CONFIG.subtitle)}</p>
              <div id="igd-status" class="igd-status">กำลังตรวจ token และโหลดข้อมูล dashboard...</div>
            </div>
            <div class="igd-hero__side">
              <div class="igd-pill">SIGNED ACCESS</div>
              <div class="igd-side__title">Model-side access ที่ผูกกับ invite เดียวกัน</div>
              <div class="igd-side__copy">
                หน้านี้จะอ่าน signed token, resolve invite bundle และแสดงคอนเท็กซ์ของโมเดลเฉพาะเส้นทางนี้เท่านั้น
              </div>
            </div>
          </section>
          <div id="igd-grid" class="igd-grid"></div>
        </div>
      </div>
    `;
  }

  function setStatus(message, tone) {
    const el = document.getElementById("igd-status");
    if (!el) return;
    el.className = "igd-status" + (tone ? " " + tone : "");
    el.textContent = message;
  }

  async function resolveInvite() {
    if (!token) throw new Error("ไม่พบ token ใน URL");
    const url = new URL(CONFIG.resolveEndpoint, window.location.origin);
    url.searchParams.set("t", token);
    const res = await fetch(url.toString(), { headers: { Accept: "application/json" } });
    const json = await res.json().catch(function () { return {}; });
    if (!res.ok || json.ok === false) {
      throw new Error((json && json.error && json.error.message) || json.message || ("HTTP " + res.status));
    }
    return json;
  }

  function renderResolved(invite) {
    const prefill = invite.prefill || {};
    const routes = invite.routes || {};
    const requirements = invite.requirements || {};
    const modelProfile = invite.model_profile || {};
    const grid = document.getElementById("igd-grid");
    if (!grid) return;

    grid.innerHTML = [
      card(
        "ข้อมูลฝั่งโมเดล",
        "สิทธิ์เข้าถึงและตัวตนของโมเดลที่ resolve มาจาก signed model token",
        kvRows([
          ["ชื่อโมเดล", toStr(modelProfile.model_name || prefill.model_name)],
          ["Model record", toStr(modelProfile.model_record_id || prefill.model_record_id)],
          ["Username", toStr(prefill.username)],
          ["ชื่อเล่น", toStr(prefill.nickname)],
          ["Telegram", toStr(prefill.telegram_username)],
          ["บทบาทของ token", roleLabel(toStr(invite.role).toLowerCase())]
        ])
      ),
      card(
        "Binding / Compliance",
        "เงื่อนไขการทำงานที่แนบมากับ dashboard ฝั่งโมเดล",
        kvRows([
          ["Immigration ID", toStr(invite.immigration_id)],
          ["Invite ID", toStr(invite.invite_id)],
          ["เส้นทางใช้งาน", laneLabel(toStr(invite.lane))],
          ["ต้องยอมรับกติกา", yesNo(requirements.rules_ack_required)],
          ["ต้อง bind กับโมเดล", yesNo(requirements.model_binding_required)],
          ["หมดอายุ", fmtDate(invite.expires_at)]
        ])
      ),
      card(
        "บริบทของลูกค้า",
        "ข้อมูลฝั่งลูกค้าที่ถูกรวมมากับ token นี้เพื่อใช้ประกอบการดูแล",
        kvRows([
          ["ชื่อที่ใช้แสดง", toStr(prefill.display_name || prefill.client_name)],
          ["อีเมลลูกค้า", toStr(prefill.email)],
          ["LINE User ID", toStr(prefill.line_user_id)],
          ["Memberstack ID", toStr(prefill.memberstack_id)]
        ])
      ),
      card(
        "เส้นทางของโมเดล",
        "ลิงก์คอนโซลและลิงก์ประกอบการทำงานที่ token นี้เปิดไว้",
        [
          routeRow("ลิงก์คอนโซล", toStr(routes.console_url)),
          routeRow("ลิงก์กติกา", toStr(routes.rules_url)),
          routeRow("สถานะ token", "ลงนามแล้วและใช้งานได้"),
          routeRow("บทบาทของ dashboard", roleLabel(CONFIG.role)),
          `<div class="igd-actions">
            ${actionLink(routes.console_url, "เปิดคอนโซล")}
            ${actionLink(routes.rules_url, "เปิดหน้ากติกา")}
          </div>`
        ].join("")
      )
    ].join("");
  }

  async function init() {
    injectShell();
    if (!token) {
      setStatus("ไม่พบ token ใน URL", "bad");
      return;
    }
    try {
      const resolved = await resolveInvite();
      renderResolved(resolved);
      setStatus("ตรวจ token สำเร็จและโหลด dashboard เรียบร้อยแล้ว", "ok");
    } catch (error) {
      setStatus(error instanceof Error ? error.message : "โหลด dashboard ไม่สำเร็จ", "bad");
    }
  }

  init();
})();
</script>
